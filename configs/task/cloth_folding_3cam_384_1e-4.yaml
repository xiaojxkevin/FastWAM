# @package _global_

defaults:
  - override /data: cloth_folding
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 16
num_workers: 8

model:
  mot_checkpoint_mixed_attn: false
  video_dit_config:
    num_input_frames: 9  # 8 history + 1 current = 9 conditioning video frames

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 8
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
