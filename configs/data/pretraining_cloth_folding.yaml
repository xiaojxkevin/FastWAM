# Pretraining data config: merges kai0 Task_A (base+dagger) + RoboCOIN Cobot_Magic
# All datasets standardized to 14-dim state/action with cameras: fixed_front, left_arm, right_arm

train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /workspace/mnt/sealab/xiaojx/dataset/kai0/Task_A/base
    - /workspace/mnt/sealab/xiaojx/dataset/kai0/Task_A/dagger
    - /workspace/mnt/sealab/xiaojx/dataset/RoboCOIN/Cobot_Magic_fold_clothes
  shape_meta:
    images:
      - key: fixed_front
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: left_arm
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: right_arm
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  pretrained_norm_stats: null
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/pretraining_cloth
  context_len: 128
