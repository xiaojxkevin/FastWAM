# FastWAM Cloth Folding — Synchronous Inference Server Config
#
# Usage:
#   python experiments/piper/serve_policy.py --config experiments/piper/serve_cloth_folding.yaml
#
# References:
#   configs/model/fastwam.yaml
#   configs/data/cloth_folding.yaml
#   configs/task/cloth_folding_3cam_384_1e-4.yaml

# ---- Server settings -------------------------------------------------
host: "0.0.0.0"
port: 8765

# ---- Checkpoint -----------------------------------------------------
checkpoint_path: "/workspace/mnt/sealab/xiaojx/FastWAM/runs/cloth_folding_3cam_384_1e-4/run_job_2026-06-03-02/checkpoints/weights/step_017500.pt"
model_dtype: "bf16" # bf16 | fp16 | no
device: "cuda"

# ---- Model parameters (mirrors configs/model/fastwam.yaml) ----------
# NOTE: load_text_encoder MUST be true for infer_action (uses encode_prompt).
#       Set to false to use precomputed text embeddings from cache (saves ~9 GB GPU memory).
#       When false, `data.text_embedding_cache_dir` must point to a valid cache directory.
# NOTE: mot_checkpoint_mixed_attn is false per cloth task override.
model:
  model_id: "Wan-AI/Wan2.2-TI2V-5B"
  tokenizer_model_id: "Wan-AI/Wan2.1-T2V-1.3B"
  tokenizer_max_len: 128
  load_text_encoder: false  # cache mode: use precomputed text embeddings to save ~9GB GPU memory
  proprio_dim: 14
  mot_checkpoint_mixed_attn: false
  action_dit_pretrained_path: "checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt"
  skip_dit_load_from_pretrain: false

  video_dit_config:
    has_image_input: false
    patch_size: [1, 2, 2]
    in_dim: 48
    hidden_dim: 3072
    ffn_dim: 14336
    freq_dim: 256
    text_dim: 4096
    out_dim: 48
    num_heads: 24
    attn_head_dim: 128
    num_layers: 30
    eps: 1.0e-06
    seperated_timestep: true
    require_clip_embedding: false
    require_vae_embedding: false
    fuse_vae_embedding_in_latents: true
    use_gradient_checkpointing: false
    video_attention_mask_mode: "first_frame_causal"
    action_conditioned: false
    action_dim: 14
    action_group_causal_mask_mode: "group_diagonal"

  action_dit_config:
    action_dim: 14
    hidden_dim: 1024
    ffn_dim: 4096
    num_heads: 24
    attn_head_dim: 128
    num_layers: 30
    text_dim: 4096
    freq_dim: 256
    eps: 1.0e-06
    use_gradient_checkpointing: false

  video_scheduler:
    train_shift: 5.0
    infer_shift: 5.0
    num_train_timesteps: 1000

  action_scheduler:
    train_shift: 5.0
    infer_shift: 5.0
    num_train_timesteps: 1000

  loss:
    lambda_action: 1.0

# ---- Data processing (mirrors configs/data/cloth_folding.yaml) ------
data:
  dataset_stats_path: "/workspace/mnt/sealab/xiaojx/FastWAM/runs/cloth_folding_3cam_384_1e-4/run_job_2026-06-03-02/dataset_stats.json"
  shape_meta:
    images:
      - key: fixed_front
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: left_arm
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: right_arm
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_obs_steps: 33
  num_output_cameras: 3
  action_output_dim: 14
  proprio_output_dim: 14
  norm_default_mode: "z-score"
  text_embedding_cache_dir: "./data/text_embeds_cache/cloth_folding"
  context_len: 128

# ---- Inference hyperparameters --------------------------------------
inference:
  action_horizon: 32 # num_frames - 1 = 32
  num_inference_steps: 10 # diffusion denoising steps
  seed: null # null = random each request
