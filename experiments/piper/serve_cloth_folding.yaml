# FastWAM Cloth Folding — Inference Server Config
# ===================================================================
# Model architecture, action/state dimensions, and normalisation params
# are inherited from the training-run config (base_config).  Only
# deployment-specific settings live here.
#
# Usage:
#   python experiments/piper/serve_policy.py --config experiments/piper/serve_cloth_folding.yaml
#   bash experiments/piper/serve_policy.sh
# ===================================================================

# ---- Training-run config (model + data processing) -------------------
run_dir: "./pretrained/0615_67_rtc"
base_config: "config.yaml"

# ---- Server ----------------------------------------------------------
host: "0.0.0.0"
port: 6006

# ---- Checkpoint ------------------------------------------------------
checkpoint_path: "step_017500.pt"
model_dtype: "bf16"  # bf16 | fp16 | no
device: "cuda"

# ---- Model loading overrides -----------------------------------------
# The finetuned checkpoint contains the full video/action MoT weights, so
# skip loading duplicate Wan/ActionDiT pretrains before applying it.
model:
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: ""

# ---- Data overrides (paths may differ at deployment time) ------------
data:
  dataset_stats_path: "dataset_stats.json"
  text_embedding_cache_dir: "./data/text_embeds_cache/cloth_folding"

# ---- Inference hyperparameters ---------------------------------------
inference:
  action_horizon: 32 # num_frames - 1
  num_inference_steps: 10 # diffusion denoising steps
  seed: 42 # null = random each request
  acceleration:
    enabled: true
    torch_compile: true
    compile_prefill: true
    compile_action: true
    compile_mode: "default"
    cuda_graph: true
